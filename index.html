<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Header</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts (Cairo for excellent Arabic and English support) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                    },
                    colors: {
                        // Strict color palette based on logo
                        primary: {
                            DEFAULT: '#3fa394', // Teal logo color
                        },
                        secondary: {
                            DEFAULT: '#ffd505', // Yellow logo color
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Mobile menu smooth expansion */
        #mobile-menu {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transform: translateY(-10px);
            visibility: hidden;
        }

        #mobile-menu.open {
            max-height: 600px;
            opacity: 1;
            transform: translateY(0);
            visibility: visible;
        }

        /* Glassmorphism effect for the navbar background to make it modern */
        .glass-nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body class="bg-white min-h-screen text-black">

    <header
        class="sticky top-0 z-50 pt-3 px-3 sm:pt-5 sm:px-6 lg:px-8 max-w-[1600px] mx-auto w-full transition-all duration-300">

        <nav
            class="glass-nav rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-black/5 px-4 py-3 xl:px-6 xl:py-3.5 flex items-center justify-between relative gap-2 xl:gap-4">

            <!-- Logo -->
            <a href="#" class="flex items-center gap-2.5 shrink-0 group">
                <div
                    class="h-9 w-9 md:h-11 md:w-11 rounded-xl bg-white flex items-center justify-center p-1 border border-black/10 group-hover:border-primary transition-colors shrink-0 shadow-sm">
                    <img src="./Asstes/school logo.jpeg" alt="School Logo"
                        class="h-full w-full object-contain rounded-lg">
                </div>
                <div class="flex flex-col justify-center">
                    <h1 data-i18n="schoolNameMain"
                        class="text-[13px] md:text-[15px] font-extrabold leading-tight text-black tracking-tight group-hover:text-primary transition-colors">
                        Ibri Private School</h1>
                    <h2 data-i18n="schoolNameSub"
                        class="text-[11px] md:text-[12px] font-bold leading-tight text-black/60 group-hover:text-secondary transition-colors mt-[1px]">
                        مدرسة عبري الخاصة</h2>
                </div>
            </a>

            <ul class="hidden xl:flex flex-1 justify-center items-center gap-5 2xl:gap-10">
                <li>
                    <a href="#"
                        class="group flex items-center text-[13px] font-bold text-black/80 hover:text-primary transition-colors">
                        <i
                            class="fa-solid fa-house text-black/40 group-hover:text-primary transition-colors me-1.5 text-[12px]"></i>
                        <span data-i18n="home">Home</span>
                    </a>
                </li>
                <li>
                    <a href="#"
                        class="group flex items-center text-[13px] font-bold text-black/80 hover:text-primary transition-colors">
                        <i
                            class="fa-solid fa-building-columns text-black/40 group-hover:text-primary transition-colors me-1.5 text-[12px]"></i>
                        <span data-i18n="about">About School</span>
                    </a>
                </li>
                <li>
                    <a href="#"
                        class="group flex items-center text-[13px] font-bold text-black/80 hover:text-primary transition-colors">
                        <i
                            class="fa-solid fa-user-plus text-black/40 group-hover:text-primary transition-colors me-1.5 text-[12px]"></i>
                        <span data-i18n="admissions">Admissions</span>
                    </a>
                </li>

                <!-- Dropdown  -->
                <li class="relative group py-2">
                    <button
                        class="group flex items-center text-[13px] font-bold text-black/80 hover:text-primary transition-colors focus:outline-none">
                        <i
                            class="fa-solid fa-layer-group text-black/40 group-hover:text-primary transition-colors me-1.5 text-[12px]"></i>
                        <span data-i18n="explore">Explore</span>
                        <i
                            class="fa-solid fa-chevron-down ms-1.5 text-[9px] text-black/40 group-hover:text-primary transition-transform duration-300 group-hover:rotate-180"></i>
                    </button>
                    <div
                        class="absolute start-1/2 -translate-x-1/2 top-full mt-1 w-48 bg-white rounded-xl shadow-[0_10px_40px_-10px_rgba(0,0,0,0.1)] border border-black/5 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 transform translate-y-3 group-hover:translate-y-0 z-50">
                        <div class="p-2 flex flex-col gap-1">
                            <a href="#"
                                class="px-3 py-2 text-[12px] font-bold text-black/70 hover:bg-black/5 hover:text-primary rounded-lg transition-colors flex items-center">
                                <i class="fa-solid fa-book-open w-6 text-center text-black/30 me-2 text-[11px]"></i>
                                <span data-i18n="academics">Academics</span>
                            </a>
                            <a href="#"
                                class="px-3 py-2 text-[12px] font-bold text-black/70 hover:bg-black/5 hover:text-primary rounded-lg transition-colors flex items-center">
                                <i class="fa-solid fa-users w-6 text-center text-black/30 me-2 text-[11px]"></i> <span data-i18n="studentLife">Student Life</span>
                            </a>
                            <a href="#"
                                class="px-3 py-2 text-[12px] font-bold text-black/70 hover:bg-black/5 hover:text-primary rounded-lg transition-colors flex items-center">
                                <i class="fa-solid fa-calendar-days w-6 text-center text-black/30 me-2 text-[11px]"></i>
                                <span data-i18n="news">News & Events</span>
                            </a>
                            <a href="#"
                                class="px-3 py-2 text-[12px] font-bold text-black/70 hover:bg-black/5 hover:text-primary rounded-lg transition-colors flex items-center">
                                <i class="fa-solid fa-images w-6 text-center text-black/30 me-2 text-[11px]"></i>
                                <span data-i18n="gallery">Gallery</span>
                            </a>
                        </div>
                    </div>
                </li>

                <li>
                    <a href="#"
                        class="group flex items-center text-[13px] font-bold text-black/80 hover:text-primary transition-colors">
                        <i
                            class="fa-solid fa-envelope text-black/40 group-hover:text-primary transition-colors me-1.5 text-[12px]"></i>
                        <span data-i18n="contact">Contact Us</span>
                    </a>
                </li>
            </ul>

            <div class="flex items-center gap-3 md:gap-5 shrink-0 justify-end">

                <!-- Language Switcher -->
                <button onclick="toggleLanguage()"
                    class="hidden md:flex items-center gap-1 text-[12px] font-bold text-black/80 hover:bg-black/5 px-2.5 py-1.5 rounded-lg transition-colors border border-transparent hover:border-black/10">
                    <i class="fa-solid fa-globe text-black/40 me-0.5"></i>
                    <span id="lang-ar" class="uppercase text-black/40 transition-colors">AR</span>
                    <span class="text-black/20 font-normal">|</span>
                    <span id="lang-en" class="uppercase text-primary transition-colors">EN</span>
                </button>

                <a href="#"
                    class="hidden sm:block text-[13px] font-bold text-black/80 hover:text-primary transition-colors px-2"><span data-i18n="contactBtn">Contact</span></a>

                <a href="#"
                    class="bg-primary hover:bg-secondary text-white hover:text-black transition-all duration-300 transform hover:-translate-y-0.5 text-[13px] font-bold py-1.5 px-4 md:py-2.5 md:px-5 rounded-[10px] flex items-center gap-2 shadow-sm hover:shadow-md group whitespace-nowrap">
                    <span data-i18n="admissionBtn">Admission</span>
                    <i id="btn-icon"
                        class="fa-solid fa-rocket text-white/90 group-hover:text-black transition-colors text-[12px]"></i>
                </a>

                <button id="mobile-menu-btn"
                    class="xl:hidden flex items-center justify-center h-10 w-10 md:h-11 md:w-11 rounded-xl bg-black/5 text-black/80 hover:bg-primary/10 hover:text-primary transition-colors focus:outline-none focus:ring-2 focus:ring-primary/20 border border-black/10">
                    <i class="fa-solid fa-bars text-lg"></i>
                </button>
            </div>

            <!-- Mobile Menu Dropdown -->
            <div id="mobile-menu"
                class="absolute top-full start-0 end-0 mt-3 bg-white rounded-2xl shadow-xl border border-black/10 xl:hidden z-50">
                <div class="p-3 sm:p-4 flex flex-col gap-1 max-h-[70vh] overflow-y-auto">
                    <!-- Mobile Links -->
                    <a href="#"
                        class="flex items-center gap-3 p-3 rounded-xl text-black/80 font-bold hover:bg-primary/10 hover:text-primary transition-colors">
                        <div class="w-8 h-8 rounded-lg bg-black/5 flex items-center justify-center text-black/40">
                            <i class="fa-solid fa-house"></i>
                        </div>
                        <span data-i18n="home">Home</span>
                    </a>
                    <a href="#"
                        class="flex items-center gap-3 p-3 rounded-xl text-black/80 font-bold hover:bg-primary/10 hover:text-primary transition-colors">
                        <div class="w-8 h-8 rounded-lg bg-black/5 flex items-center justify-center text-black/40">
                            <i class="fa-solid fa-building-columns"></i>
                        </div>
                        <span data-i18n="about">About School</span>
                    </a>
                    <a href="#"
                        class="flex items-center gap-3 p-3 rounded-xl text-black/80 font-bold hover:bg-primary/10 hover:text-primary transition-colors">
                        <div class="w-8 h-8 rounded-lg bg-black/5 flex items-center justify-center text-black/40">
                            <i class="fa-solid fa-book-open"></i>
                        </div>
                        <span data-i18n="academics">Academics</span>
                    </a>
                    <a href="#"
                        class="flex items-center gap-3 p-3 rounded-xl text-black/80 font-bold hover:bg-primary/10 hover:text-primary transition-colors">
                        <div class="w-8 h-8 rounded-lg bg-black/5 flex items-center justify-center text-black/40">
                            <i class="fa-solid fa-user-plus"></i>
                        </div>
                        <span data-i18n="admissions">Admissions</span>
                    </a>
                    <a href="#"
                        class="flex items-center gap-3 p-3 rounded-xl text-black/80 font-bold hover:bg-primary/10 hover:text-primary transition-colors">
                        <div class="w-8 h-8 rounded-lg bg-black/5 flex items-center justify-center text-black/40">
                            <i class="fa-solid fa-users"></i>
                        </div>
                        <span data-i18n="studentLife">Student Life</span>
                    </a>
                    <a href="#"
                        class="flex items-center gap-3 p-3 rounded-xl text-black/80 font-bold hover:bg-primary/10 hover:text-primary transition-colors">
                        <div class="w-8 h-8 rounded-lg bg-black/5 flex items-center justify-center text-black/40">
                            <i class="fa-solid fa-calendar-days"></i>
                        </div>
                        <span data-i18n="news">News & Events</span>
                    </a>
                    <a href="#"
                        class="flex items-center gap-3 p-3 rounded-xl text-black/80 font-bold hover:bg-primary/10 hover:text-primary transition-colors">
                        <div class="w-8 h-8 rounded-lg bg-black/5 flex items-center justify-center text-black/40">
                            <i class="fa-solid fa-images"></i>
                        </div>
                        <span data-i18n="gallery">Gallery</span>
                    </a>
                    <a href="#"
                        class="flex items-center gap-3 p-3 rounded-xl text-black/80 font-bold hover:bg-primary/10 hover:text-primary transition-colors">
                        <div class="w-8 h-8 rounded-lg bg-black/5 flex items-center justify-center text-black/40">
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                        <span data-i18n="contact">Contact Us</span>
                    </a>

                    <div class="border-t border-black/10 my-2"></div>

                    <!-- Mobile Language Switcher -->
                    <div class="flex items-center justify-between p-3 md:hidden">
                        <span class="font-bold text-black/80 text-[14px]" data-i18n="selectLang">Select Language</span>
                        <div class="flex items-center gap-2 bg-black/5 p-1 rounded-lg">
                            <button onclick="setLanguage('ar')" id="mob-lang-ar"
                                class="px-4 py-1.5 text-xs font-bold rounded-md transition-colors text-black/60 hover:text-black">AR</button>
                            <button onclick="setLanguage('en')" id="mob-lang-en"
                                class="px-4 py-1.5 text-xs font-bold rounded-md bg-white shadow-sm text-primary transition-colors">EN</button>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>



    <script>
        // Mobile Menu Logic
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const icon = mobileMenuBtn.querySelector('i');

        mobileMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            mobileMenu.classList.toggle('open');
            if (mobileMenu.classList.contains('open')) {
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-xmark');
            } else {
                icon.classList.remove('fa-xmark');
                icon.classList.add('fa-bars');
            }
        });

        // Close mobile menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!mobileMenuBtn.contains(e.target) && !mobileMenu.contains(e.target) && mobileMenu.classList.contains('open')) {
                mobileMenu.classList.remove('open');
                icon.classList.remove('fa-xmark');
                icon.classList.add('fa-bars');
            }
        });

        // RTL & LTR Toggle Logic
        // Translation Dictionary
        const translations = {
            en: {
                schoolNameMain: "Ibri Private School",
                schoolNameSub: "مدرسة عبري الخاصة",
                home: "Home",
                about: "About School",
                admissions: "Admissions",
                explore: "Explore",
                academics: "Academics",
                studentLife: "Student Life",
                news: "News & Events",
                gallery: "Gallery",
                contact: "Contact Us",
                contactBtn: "Contact",
                admissionBtn: "Admission",
                selectLang: "Select Language"
            },
            ar: {
                schoolNameMain: "مدرسة عبري الخاصة",
                schoolNameSub: "Ibri Private School",
                home: "الرئيسية",
                about: "عن المدرسة",
                admissions: "القبول والتسجيل",
                explore: "استكشف",
                academics: "الشؤون الأكاديمية",
                studentLife: "الحياة الطلابية",
                news: "الأخبار والفعاليات",
                gallery: "معرض الصور",
                contact: "اتصل بنا",
                contactBtn: "تواصل معنا",
                admissionBtn: "سجل الآن",
                selectLang: "اختر اللغة"
            }
        };

        // RTL & LTR Toggle Logic
        function toggleLanguage() {
            const currentDir = document.documentElement.getAttribute('dir');
            setLanguage(currentDir === 'rtl' ? 'en' : 'ar');
        }

        function setLanguage(lang) {
            const htmlTag = document.documentElement;
            const btnIcon = document.getElementById('btn-icon');

            if (lang === 'ar') {
                htmlTag.setAttribute('dir', 'rtl');
                htmlTag.setAttribute('lang', 'ar');

                // Desktop Toggle
                document.getElementById('lang-ar').classList.replace('text-black/40', 'text-primary');
                document.getElementById('lang-en').classList.replace('text-primary', 'text-black/40');

                // Mobile Toggle
                document.getElementById('mob-lang-ar').classList.add('bg-white', 'shadow-sm', 'text-primary');
                document.getElementById('mob-lang-ar').classList.remove('text-black/60');
                document.getElementById('mob-lang-en').classList.remove('bg-white', 'shadow-sm', 'text-primary');
                document.getElementById('mob-lang-en').classList.add('text-black/60');

                // Adjust specific elements for RTL
                btnIcon.style.transform = 'scaleX(-1)';
            } else {
                htmlTag.setAttribute('dir', 'ltr');
                htmlTag.setAttribute('lang', 'en');

                // Desktop Toggle
                document.getElementById('lang-en').classList.replace('text-black/40', 'text-primary');
                document.getElementById('lang-ar').classList.replace('text-primary', 'text-black/40');

                // Mobile Toggle
                document.getElementById('mob-lang-en').classList.add('bg-white', 'shadow-sm', 'text-primary');
                document.getElementById('mob-lang-en').classList.remove('text-black/60');
                document.getElementById('mob-lang-ar').classList.remove('bg-white', 'shadow-sm', 'text-primary');
                document.getElementById('mob-lang-ar').classList.add('text-black/60');

                // Adjust specific elements for LTR
                btnIcon.style.transform = 'scaleX(1)';
            }

            // Apply Translations to all elements
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });
        }
    </script>
</body>

</html>
